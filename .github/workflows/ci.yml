name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (neovim ${{ matrix.neovim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - name: Run test suite
        run: nvim --headless -u NONE -i NONE -l tests/run.lua
